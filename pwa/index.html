<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d0d1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="hfsignals.live">
  <meta name="description" content="Real-time HF propagation from the Reverse Beacon Network and PSKReporter">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <title>hfsignals.live</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="title-block">
        <h1>HFSIGNALS.LIVE</h1>
        <p class="subtitle">LIVE HF SIGNAL LEVELS</p>
      </div>
      <div class="byline">by Gerry, W1VE</div>
      <div class="byline byline-tnx">TNX ReverseBeacon Team!</div>
    </div>
  </header>

  <div class="controls">
    <div class="vantage-row">
      <span class="ctrl-label">Vantage:</span>

      <label class="radio-label">
        <input type="radio" name="vantage-mode" value="region" checked id="rb-region">
        <span>Region</span>
      </label>

      <select id="region-select" class="ctrl-select">
        <option value="0">E. North America</option>
        <option value="1">C. North America</option>
        <option value="2">W. North America</option>
        <option value="3">Caribbean</option>
        <option value="4">South America</option>
        <option value="5">Europe</option>
        <option value="6">Africa</option>
        <option value="7">Asia</option>
        <option value="8">Oceania</option>
      </select>

      <label class="radio-label">
        <input type="radio" name="vantage-mode" value="grid" id="rb-grid">
        <span>Grid</span>
      </label>

      <input type="text" id="grid-input" class="ctrl-input" placeholder="FN42"
             maxlength="6" disabled autocomplete="off" autocorrect="off"
             autocapitalize="characters" spellcheck="false">

      <!-- Auto-update grid from GPS — directly right of grid box -->
      <label class="check-label" id="autoupdate-label">
        <input type="checkbox" id="autoupdate-cb" disabled>
        <span>Auto</span>
      </label>

      <span class="ctrl-label" id="radius-label">Skimmer Radius:</span>

      <select id="radius-select" class="ctrl-select" disabled>
        <option value="125">125 mi</option>
        <option value="250">250 mi</option>
        <option value="500" selected>500 mi</option>
        <option value="1000">1000 mi</option>
        <option value="1500">1500 mi</option>
        <option value="2000">2000 mi</option>
        <option value="5000">5000 mi</option>
      </select>

      <button id="unit-toggle" class="unit-toggle" disabled>mi</button>

      <div class="theme-controls" role="group" aria-label="Theme">
        <button type="button" id="theme-dark" class="theme-btn">Dark</button>
        <button type="button" id="theme-light" class="theme-btn">Light</button>
        <button type="button" id="theme-cb" class="theme-btn">CB</button>
      </div>
    </div>
  </div>

  <div class="desktop-main">
    <div id="sw-bar">
      <div class="sw-item"><span class="sw-lbl">SFI</span><span class="sw-val" id="sw-sfi">—</span></div>
      <div class="sw-item"><span class="sw-lbl">SSN</span><span class="sw-val" id="sw-ssn">—</span></div>
      <div class="sw-item"><span class="sw-lbl">A-Index</span><span class="sw-val" id="sw-a">—</span></div>
      <div class="sw-item"><span class="sw-lbl">K-Index</span><span class="sw-val" id="sw-k">—</span></div>
      <div class="sw-item"><span class="sw-lbl">Solar Wind</span><span class="sw-val" id="sw-wind">—</span></div>
      <div class="sw-item"><span class="sw-lbl">Bz</span><span class="sw-val" id="sw-bz">—</span></div>
      <div class="sw-item"><span class="sw-lbl">UTC</span><span class="sw-val sw-utc" id="sw-utc">00:00:00</span></div>
    </div>

    <div class="vantage-display">
      <div class="vantage-display-label">Vantage Point:</div>
      <div class="vantage-display-value" id="vantage-point-text">E. North America</div>
      <div class="vantage-place-name" id="vantage-place-name" style="display:none"></div>
      <canvas id="vantage-map-canvas" class="vantage-map-canvas" aria-label="Vantage map"></canvas>
      <div class="vantage-skimmer-wrap">
        <span id="vantage-skimmer-label" class="skimmer-count skimmer-none vantage-count-label">0 skimmers</span>
        <span class="vantage-count-sep"> / </span>
        <span id="vantage-ftx-label" class="skimmer-count skimmer-none vantage-count-label">0 DIG reports</span>
        <span id="skimmer-count" class="sr-only">0 skimmers / 0 DIG reports</span>
      </div>
      <div class="vantage-audio-wrap">
        <button type="button" id="vantage-audio-btn" class="vantage-audio-btn" aria-label="Play propagation audio report" title="Audio Radio Conditions Report (updated every 15 minutes)">
          <svg class="audio-btn-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <!-- Speaker icon -->
            <g class="icon-speaker">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
            </g>
            <!-- Spinner ring (hidden unless .loading) -->
            <circle class="icon-spinner-ring" cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="42 14"/>
          </svg>
          <!-- Countdown overlay (shown during .loading) -->
          <span class="audio-countdown" id="audio-countdown" aria-hidden="true"></span>
        </button>
        <audio id="vantage-audio-player" preload="none"></audio>
      </div>
    </div>

    <div class="meters-scroll">
      <div class="meters-grid" id="meters-grid">
        <!-- Region panels injected by JS (desktop/tablet) -->
      </div>
    </div>
  </div>

  <div class="phone-accordion" id="phone-accordion">
    <!-- Accordion rows injected by JS (phone only) -->
  </div>

  <footer id="status-bar">
    Loading live feed...
  </footer>

  <script src="app.js"></script>
  <script>
    (function() {
      fetch('/audio/tooltip')
        .then(function(r){ return r.ok ? r.json() : null; })
        .then(function(d){
          if (!d || !d.tooltip) return;
          var btn = document.getElementById('vantage-audio-btn');
          if (btn) {
            btn.title = d.tooltip;
            btn.setAttribute('aria-label', d.tooltip);
          }
        })
        .catch(function(){});
    })();
  </script>
</body>
</html>
