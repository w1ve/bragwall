services:
  rbn-smeter:
    build: .
    container_name: rbn-smeter
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
      - EMAIL=${EMAIL}
      - SKIP_CERTBOT=${SKIP_CERTBOT:-false}
      - STRENGTH_DOMAIN=rbnstrength.rm.gl
      - ASYNC_API_KEY=${ASYNC_API_KEY:-}
      - ASYNC_VOICE_NAME=${ASYNC_VOICE_NAME:-tucker}
      - ASYNC_VOICE_ID=${ASYNC_VOICE_ID:-}
      - AUDIO_CACHE_MS=${AUDIO_CACHE_MS:-900000}
    volumes:
      - certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    networks:
      - rbn-net
    depends_on:
      - rbn-badge

  rbn-badge:
    build:
      context: ./badge
      dockerfile: Dockerfile
    container_name: rbn-badge
    restart: unless-stopped
    expose:
      - "3002"
    environment:
      - PORT=3002
    networks:
      - rbn-net

volumes:
  certs:
  certbot-www:

networks:
  rbn-net:
    external: true
